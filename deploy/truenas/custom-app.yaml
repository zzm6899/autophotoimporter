services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: photo_importer_updates
      POSTGRES_USER: photo_importer
      POSTGRES_PASSWORD: CHANGE_ME_POSTGRES_PASSWORD
    restart: unless-stopped
    volumes:
      - /mnt/tank/apps/photo-importer/postgres:/var/lib/postgresql/data
      - /mnt/tank/apps/photo-importer/services/update-admin/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    image: ghcr.io/zzm6899/photo-importer-update-admin:latest
    environment:
      PORT: "5071"
      DATABASE_URL: postgres://photo_importer:CHANGE_ME_POSTGRES_PASSWORD@db:5432/photo_importer_updates
      LICENSE_PUBLIC_KEY_PATH: /config/public.pem
      LICENSE_PRIVATE_KEY_PATH: /config/private.pem

      # Admin credentials
      ADMIN_EMAIL: CHANGE_ME_ADMIN_EMAIL
      ADMIN_PASSWORD: CHANGE_ME_ADMIN_PASSWORD
      ADMIN_SESSION_SECRET: CHANGE_ME_ADMIN_SESSION_SECRET
      UPDATE_TOKEN_SECRET: CHANGE_ME_UPDATE_TOKEN_SECRET
      ADMIN_API_TOKEN: CHANGE_ME_ADMIN_API_TOKEN

      # GitHub release integration
      GITHUB_RELEASE_OWNER: zzm6899
      GITHUB_RELEASE_REPO: autophotoimporter
      GITHUB_RELEASE_TOKEN: CHANGE_ME_GITHUB_RELEASE_TOKEN
      GITHUB_API_BASE_URL: https://api.github.com
      PUBLIC_UPDATES_BASE_URL: https://keptra.z2hs.au
      COOKIE_SECURE: "true"

      # --- SMTP email (Gmail or any SMTP server) ---
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USERNAME: zacmorganphotography@gmail.com
      MAIL_PASSWORD: CHANGE_ME_GMAIL_APP_PASSWORD
      MAIL_FROM: zacmorganphotography@gmail.com

      # --- Stripe payments ---
      # Get these from https://dashboard.stripe.com/apikeys
      STRIPE_SECRET_KEY: CHANGE_ME_STRIPE_SECRET_KEY
      STRIPE_PUBLISHABLE_KEY: CHANGE_ME_STRIPE_PUBLISHABLE_KEY
      # Webhook secret — from https://dashboard.stripe.com/webhooks
      # Register: https://keptra.z2hs.au/stripe/webhook
      # Events: checkout.session.completed, customer.subscription.updated
      STRIPE_WEBHOOK_SECRET: CHANGE_ME_STRIPE_WEBHOOK_SECRET

      # --- CORS (comma-separated origins allowed to call /api/v1/*) ---
      # Electron renderer uses localhost in dev; add your website domain for prod
      CORS_ALLOWED_ORIGINS: "https://keptra.z2hs.au,https://admin.keptra.z2hs.au,https://updates.keptra.z2hs.au,https://culler.z2hs.au,https://admin.culler.z2hs.au,https://updates.culler.z2hs.au,http://keptra.z2hs.au,http://admin.keptra.z2hs.au,http://updates.keptra.z2hs.au,http://culler.z2hs.au,http://admin.culler.z2hs.au,http://updates.culler.z2hs.au"

      # --- Trial / pricing defaults (overridable in /admin/pricing UI) ---
      TRIAL_DAYS: "14"
      TRIAL_MAX_DEVICES: "1"
      TRIAL_COOLDOWN_DAYS: "30"

    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "5071:5071"
    volumes:
      - /mnt/tank/apps/photo-importer/scripts/license-keys/public.pem:/config/public.pem:ro
      - /mnt/tank/apps/photo-importer/scripts/license-keys/private.pem:/config/private.pem:ro
      - /mnt/tank/apps/photo-importer/artifacts:/srv/artifacts

<svg width="720" height="420" viewBox="0 0 720 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Keeper selection workflow</title>
  <desc id="desc">A memory card flows through keyboard culling into selected keeper photos.</desc>
  <style>
    .grid { animation: gridDrift 9s linear infinite; }
    .card-lines { animation: pulseLines 2.2s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 10 16; animation: flowDash 1.45s linear infinite; }
    .key { transform-box: fill-box; transform-origin: center; animation: keyPulse 4.8s ease-in-out infinite; }
    .key-x { animation-delay: .55s; }
    .key-rate { animation-delay: 1.1s; }
    .photo-stack { transform-box: fill-box; transform-origin: center; animation: stackFloat 3.2s ease-in-out infinite; }
    .keeper-check { stroke-dasharray: 110; stroke-dashoffset: 110; animation: drawCheck 4.8s ease-in-out infinite; }
    .bottom-wave { stroke-dasharray: 20 18; animation: flowDash 2.4s linear infinite; }
    @keyframes gridDrift { from { transform: translateX(0); } to { transform: translateX(-28px); } }
    @keyframes pulseLines { 0%, 100% { opacity: .55; } 50% { opacity: 1; } }
    @keyframes flowDash { to { stroke-dashoffset: -52; } }
    @keyframes keyPulse { 0%, 12%, 100% { transform: scale(1); } 6% { transform: scale(1.08); } }
    @keyframes stackFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes drawCheck { 0%, 58% { stroke-dashoffset: 110; } 72%, 100% { stroke-dashoffset: 0; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .keeper-check { stroke-dashoffset: 0; } }
  </style>
  <defs>
    <linearGradient id="cardGlow" x1="70" y1="52" x2="622" y2="378" gradientUnits="userSpaceOnUse">
      <stop stop-color="#59DDB9"/>
      <stop offset="0.54" stop-color="#37B69F"/>
      <stop offset="1" stop-color="#1E6E92"/>
    </linearGradient>
    <linearGradient id="panel" x1="134" y1="88" x2="574" y2="352" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C282B"/>
      <stop offset="1" stop-color="#101719"/>
    </linearGradient>
    <filter id="shadow" x="58" y="40" width="604" height="358" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="18" fill="#0C0F11"/>
  <g class="grid" opacity="0.7">
    <path d="M96 108H624M96 166H624M96 224H624M96 282H624" stroke="#1E2B2E" stroke-width="1"/>
    <path d="M146 70V350M264 70V350M382 70V350M500 70V350M618 70V350" stroke="#172124" stroke-width="1"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="92" y="72" width="536" height="276" rx="18" fill="url(#panel)" stroke="#2B3337"/>
    <rect x="122" y="104" width="112" height="148" rx="12" fill="#11181A" stroke="#314044"/>
    <path d="M146 128H202V214H146V128Z" fill="#1C2124" stroke="#37B69F" stroke-width="3"/>
    <path class="card-lines" d="M160 144H188M160 160H188M160 176H188" stroke="#5AD69D" stroke-width="4" stroke-linecap="round"/>
    <rect x="142" y="270" width="78" height="32" rx="8" fill="#1C2124" stroke="#2B3337"/>
    <text x="181" y="291" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#9BA9AE">Card</text>
    <path class="flow-line" d="M254 180H318" stroke="#37B69F" stroke-width="5" stroke-linecap="round"/>
    <path d="M305 163L322 180L305 197" stroke="#37B69F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g class="key key-p"><rect x="340" y="108" width="122" height="56" rx="12" fill="#131B1D" stroke="#2B3337"/>
    <text x="401" y="142" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#F2F6F7">P</text></g>
    <g class="key key-x"><rect x="340" y="182" width="122" height="56" rx="12" fill="#131B1D" stroke="#2B3337"/>
    <text x="401" y="216" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#F2F6F7">X</text></g>
    <g class="key key-rate"><rect x="340" y="256" width="122" height="56" rx="12" fill="#131B1D" stroke="#2B3337"/>
    <text x="401" y="290" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#F2F6F7">1-5</text></g>
    <path class="flow-line" d="M482 180H546" stroke="#37B69F" stroke-width="5" stroke-linecap="round"/>
    <path d="M533 163L550 180L533 197" stroke="#37B69F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g class="photo-stack">
      <rect x="548" y="106" width="48" height="62" rx="8" fill="#37B69F"/>
      <rect x="526" y="142" width="48" height="62" rx="8" fill="#52D7B5"/>
      <rect x="570" y="178" width="48" height="62" rx="8" fill="#2585A1"/>
      <path class="keeper-check" d="M538 173L552 187L581 154" stroke="#F6FBFA" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="520" y="270" width="94" height="32" rx="8" fill="#12332F" stroke="#37B69F"/>
    <text x="567" y="291" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#DDF9F2">Keepers</text>
  </g>
  <path class="bottom-wave" d="M118 344C182 382 260 385 352 358C445 330 515 336 601 367" stroke="url(#cardGlow)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Culler</title>
  <meta name="description" content="Complete your Culler purchase and receive your activation code by email." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d11;
      --surface: rgba(17, 20, 26, 0.95);
      --surface-raised: rgba(24, 29, 37, 0.96);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.13);
      --text: #f4f6fb;
      --text-muted: #a0abc0;
      --text-faint: #6f7890;
      --accent: #6c63ff;
      --accent-hover: #7c74ff;
      --accent-glow: rgba(108, 99, 255, 0.20);
      --green: #34d399;
      --green-soft: rgba(52, 211, 153, 0.12);
      --red: #ff7d7d;
      --red-soft: rgba(255, 125, 125, 0.12);
      --radius: 20px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    body {
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(108, 99, 255, 0.18), transparent 30%),
        linear-gradient(180deg, #0a0c10 0%, #0b0d11 100%);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(520px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }
    .brand svg { width: 26px; height: 26px; flex-shrink: 0; }
    .back-link {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .back-link:hover { color: var(--text); }

    /* ── Card ── */
    .card {
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 28px;
    }

    /* ── Plan summary strip ── */
    .plan-strip {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 16px;
      border-radius: 14px;
      background: rgba(108, 99, 255, 0.10);
      border: 1px solid rgba(108, 99, 255, 0.22);
      margin-bottom: 20px;
    }
    .plan-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c8ccff;
      margin-bottom: 4px;
    }
    .plan-price {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
    }
    .plan-tag {
      flex-shrink: 0;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
      font-size: 0.74rem;
      align-self: center;
    }

    /* ── Summary rows ── */
    .summary {
      display: grid;
      gap: 8px;
      padding: 14px 0 16px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      font-size: 0.86rem;
      color: var(--text-muted);
    }
    .summary-row strong { color: var(--text); font-weight: 600; }
    .summary-row.total { font-size: 0.92rem; font-weight: 700; color: var(--text); }

    /* ── Form ── */
    .form { display: grid; gap: 14px; }
    .form-group { display: grid; gap: 6px; }
    label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      justify-content: space-between;
    }
    .field-note { color: var(--text-faint); font-weight: 400; font-size: 0.77rem; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.93rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: rgba(108,99,255,0.6);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
    }
    input::placeholder { color: var(--text-faint); }
    select { appearance: none; cursor: pointer; }
    .field-hint { font-size: 0.78rem; color: var(--text-faint); }

    /* ── Submit ── */
    .submit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #847cff);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 28px var(--accent-glow);
      transition: transform 0.12s, box-shadow 0.15s, opacity 0.15s;
      margin-top: 4px;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 16px 32px var(--accent-glow); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Alerts ── */
    .alert { display: none; padding: 10px 13px; border-radius: 12px; font-size: 0.86rem; margin-bottom: 14px; line-height: 1.5; }
    .alert.show { display: block; }
    .alert-error { color: var(--red); background: var(--red-soft); border: 1px solid rgba(255,125,125,0.2); }
    .alert-success { color: var(--green); background: var(--green-soft); border: 1px solid rgba(52,211,153,0.2); }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 18px;
      color: var(--text-faint);
      font-size: 0.8rem;
    }
    .secure-badge { display: inline-flex; align-items: center; gap: 5px; }
    .secure-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--green); }

    @media (max-width: 560px) {
      .shell { width: calc(100% - 24px); padding-top: 20px; }
      .card { padding: 20px; border-radius: 16px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a href="/" class="brand" aria-label="Back to Culler">
        <svg viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M128 252C196.483 252 252 196.483 252 128C252 59.5167 196.483 4 128 4C59.5167 4 4 59.5167 4 128C4 196.483 59.5167 252 128 252ZM128 226.694C182.507 226.694 226.694 182.507 226.694 128C226.694 73.4929 182.507 29.3061 128 29.3061C73.4929 29.3061 29.3061 73.4929 29.3061 128C29.3061 182.507 73.4929 226.694 128 226.694ZM188.633 131.549C181.333 137.253 172.145 140.653 162.163 140.653C138.404 140.653 119.143 121.392 119.143 97.6327C119.143 85.8325 123.894 75.1419 131.587 67.3695C130.4 67.3004 129.204 67.2653 128 67.2653C94.4572 67.2653 67.2653 94.4572 67.2653 128C67.2653 161.543 94.4572 188.735 128 188.735C160.352 188.735 186.795 163.44 188.633 131.549ZM117.878 148.245C123.468 148.245 128 143.713 128 138.122C128 132.532 123.468 128 117.878 128C112.287 128 107.755 132.532 107.755 138.122C107.755 143.713 112.287 148.245 117.878 148.245ZM107.755 153.306C107.755 156.101 105.489 158.367 102.694 158.367C99.8986 158.367 97.6327 156.101 97.6327 153.306C97.6327 150.511 99.8986 148.245 102.694 148.245C105.489 148.245 107.755 150.511 107.755 153.306ZM177.347 97.6326C177.347 106.018 170.549 112.816 162.163 112.816C161.21 112.816 160.278 112.729 159.373 112.561C163.87 111.53 167.225 107.503 167.225 102.694C167.225 97.1034 162.693 92.5714 157.102 92.5714C152.292 92.5714 148.266 95.9258 147.235 100.423C147.067 99.5183 146.98 98.5857 146.98 97.6326C146.98 89.2469 153.778 82.449 162.163 82.449C170.549 82.449 177.347 89.2469 177.347 97.6326Z" fill="white"/>
        </svg>
        Culler
      </a>
      <a href="/#pricing" class="back-link">← Back to pricing</a>
    </div>

    <div class="card">
      <div class="plan-strip">
        <div>
          <div class="plan-label" id="planName">Loading…</div>
          <div class="plan-price" id="planPrice">—</div>
        </div>
        <div class="plan-tag" id="planTag">License</div>
      </div>

      <div class="summary">
        <div class="summary-row">
          <span>Base plan</span>
          <strong id="planBaseValue">—</strong>
        </div>
        <div class="summary-row">
          <span>Devices</span>
          <strong id="planDeviceValue">1 device</strong>
        </div>
        <div class="summary-row total">
          <span id="planTotalLabel">Due today</span>
          <strong id="planTotalValue">—</strong>
        </div>
      </div>

      <div class="alert alert-error" id="error" role="alert"></div>
      <div class="alert alert-success" id="success" role="status"></div>

      <form id="checkoutForm" class="form">
        <div class="form-group">
          <label for="name">
            Full name
            <span class="field-note">Shown on the license</span>
          </label>
          <input type="text" id="name" name="name" required placeholder="Oscar Smith" autocomplete="name" />
        </div>

        <div class="form-group">
          <label for="email">
            Email address
            <span class="field-note">Where we send the code</span>
          </label>
          <input type="email" id="email" name="email" required placeholder="oscar@example.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="deviceCount">
            Devices
            <span class="field-note">Seats on this license</span>
          </label>
          <select id="deviceCount" name="deviceCount"></select>
          <div class="field-hint" id="deviceHint">1 device included.</div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span>Proceed to payment</span>
          <span aria-hidden="true">→</span>
        </button>
      </form>

      <div class="footer">
        <a href="/#pricing" style="color:var(--text-faint)">← Pricing</a>
        <div class="secure-badge">
          <span class="secure-dot"></span>
          Secured by Stripe
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan') || 'monthly';
    const requestedDevices = parseInt(params.get('devices') || '', 10);

    let pricingData = null;
    let selectedDevices = Number.isInteger(requestedDevices) && requestedDevices > 0 ? requestedDevices : 1;

    function formatMoney(value, currency, period) {
      const amount = Number(value || 0);
      const money = new Intl.NumberFormat('en-AU', {
        style: 'currency', currency,
        minimumFractionDigits: amount % 1 === 0 ? 0 : 2,
      }).format(amount);
      return money + (period ? ' ' + period : '');
    }

    function deviceLabel(n) { return n === 1 ? '1 device' : n + ' devices'; }

    function displayPlanMeta() {
      const names = { monthly: 'Monthly Pro', yearly: 'Yearly Pro', lifetime: 'Lifetime License' };
      const tags  = { monthly: 'Flexible', yearly: 'Best value', lifetime: 'One-time' };
      document.getElementById('planName').textContent = names[plan] || plan;
      document.getElementById('planTag').textContent  = tags[plan]  || 'License';
    }

    function buildDeviceOptions() {
      if (!pricingData) return;
      const included = Math.max(1, Number(pricingData.includedDevices || 1));
      const max = Math.max(included, Number(pricingData.maxCheckoutDevices || included));
      if (selectedDevices < included) selectedDevices = included;
      if (selectedDevices > max)      selectedDevices = max;
      const sel = document.getElementById('deviceCount');
      let opts = '';
      for (let i = included; i <= max; i++) opts += `<option value="${i}">${deviceLabel(i)}</option>`;
      sel.innerHTML = opts;
      sel.value = String(selectedDevices);
    }

    function updateDisplay() {
      if (!pricingData?.plans) return;
      const planData = pricingData.plans[plan];
      if (!planData) { showError('Plan not found.'); return; }

      const currency = (pricingData.currency || 'aud').toUpperCase();
      const included = Math.max(1, Number(pricingData.includedDevices || 1));
      const extraPrice = Number(pricingData.deviceUpgradePrice || 0) / 100;
      const extraSeats = Math.max(0, selectedDevices - included);
      const total = planData.price + extraSeats * extraPrice;

      displayPlanMeta();
      document.getElementById('planPrice').textContent       = formatMoney(planData.price, currency, planData.period || '');
      document.getElementById('planBaseValue').textContent   = formatMoney(planData.price, currency, planData.period || '');
      document.getElementById('planDeviceValue').textContent = deviceLabel(selectedDevices);
      document.getElementById('planTotalValue').textContent  = formatMoney(total, currency, '');
      document.getElementById('planTotalLabel').textContent  = plan === 'lifetime' ? 'Total' : 'Due today';

      const hint = document.getElementById('deviceHint');
      if (extraPrice > 0) {
        hint.textContent = `${deviceLabel(included)} included. Each extra device adds ${formatMoney(extraPrice, currency, '')} once.`;
      } else {
        hint.textContent = 'Choose how many devices this license covers.';
      }
    }

    async function loadPricing() {
      try {
        const res = await fetch(BASE + '/api/v1/pricing');
        if (!res.ok) throw new Error('Failed to load pricing');
        pricingData = await res.json();
        buildDeviceOptions();
        updateDisplay();
      } catch (err) {
        showError(err.message);
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('success').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('success');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('error').classList.remove('show');
    }

    document.getElementById('deviceCount').addEventListener('change', (e) => {
      selectedDevices = parseInt(e.target.value, 10) || selectedDevices;
      updateDisplay();
    });

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('submitBtn');

      if (!name || !email) { showError('Please fill in all fields.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email address.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span>Preparing checkout…</span>';

      try {
        const res = await fetch(BASE + '/api/v1/checkout/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ plan, name, email, maxDevices: selectedDevices }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Checkout failed');
        if (data.url) {
          showSuccess('Redirecting to Stripe…');
          setTimeout(() => { window.location.href = data.url; }, 400);
        } else {
          throw new Error('No checkout URL returned');
        }
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.innerHTML = '<span>Proceed to payment</span><span aria-hidden="true">→</span>';
      }
    });

    loadPricing();
  </script>
</body>
</html>

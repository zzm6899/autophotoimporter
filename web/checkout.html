<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Keptra</title>
  <meta name="description" content="Complete your Keptra purchase and receive your activation code by email." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0f11;
      --surface: rgba(18, 23, 25, 0.96);
      --surface-raised: rgba(24, 31, 34, 0.96);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.13);
      --text: #f4f6fb;
      --text-muted: #a0abc0;
      --text-faint: #6f7890;
      --accent: #37b69f;
      --accent-hover: #45c6af;
      --accent-glow: rgba(55, 182, 159, 0.18);
      --green: #34d399;
      --green-soft: rgba(52, 211, 153, 0.12);
      --red: #ff7d7d;
      --red-soft: rgba(255, 125, 125, 0.12);
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    body {
      font-family: var(--font);
      color: var(--text);
      background: linear-gradient(180deg, #0a0d0f 0%, #0c0f11 100%);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(520px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0;
    }
    .brand svg { width: 26px; height: 26px; flex-shrink: 0; }
    .back-link {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .back-link:hover { color: var(--text); }

    /* ── Card ── */
    .card {
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 28px;
    }

    /* ── Plan summary strip ── */
    .plan-strip {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 16px;
      border-radius: 14px;
      background: rgba(55, 182, 159, 0.10);
      border: 1px solid rgba(55, 182, 159, 0.22);
      margin-bottom: 20px;
    }
    .plan-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a7eadc;
      margin-bottom: 4px;
    }
    .plan-price {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1;
    }
    .plan-tag {
      flex-shrink: 0;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
      font-size: 0.74rem;
      align-self: center;
    }

    /* ── Summary rows ── */
    .summary {
      display: grid;
      gap: 8px;
      padding: 14px 0 16px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      font-size: 0.86rem;
      color: var(--text-muted);
    }
    .summary-row strong { color: var(--text); font-weight: 600; }
    .summary-row.total { font-size: 0.92rem; font-weight: 700; color: var(--text); }
    .summary-row.is-muted { color: var(--text-faint); }

    /* ── Form ── */
    .form { display: grid; gap: 14px; }
    .form-group { display: grid; gap: 6px; }
    label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      justify-content: space-between;
    }
    .field-note { color: var(--text-faint); font-weight: 400; font-size: 0.77rem; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.93rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: rgba(55,182,159,0.62);
      box-shadow: 0 0 0 3px rgba(55,182,159,0.12);
    }
    input::placeholder { color: var(--text-faint); }
    select { appearance: none; cursor: pointer; }
    .field-hint { font-size: 0.78rem; color: var(--text-faint); }
    .device-stepper {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 44px;
      gap: 8px;
      align-items: stretch;
    }
    .device-stepper button {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-raised);
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, opacity 0.15s;
    }
    .device-stepper button:hover:not(:disabled) {
      border-color: rgba(55,182,159,0.55);
      background: rgba(55,182,159,0.10);
    }
    .device-stepper button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }
    .device-stepper-value {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-weight: 750;
      font-size: 0.95rem;
    }

    /* ── Submit ── */
    .submit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #041210;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 28px var(--accent-glow);
      transition: transform 0.12s, box-shadow 0.15s, opacity 0.15s;
      margin-top: 4px;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 16px 32px var(--accent-glow); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Alerts ── */
    .alert { display: none; padding: 10px 13px; border-radius: 12px; font-size: 0.86rem; margin-bottom: 14px; line-height: 1.5; }
    .alert.show { display: block; }
    .alert-error { color: var(--red); background: var(--red-soft); border: 1px solid rgba(255,125,125,0.2); }
    .alert-success { color: var(--green); background: var(--green-soft); border: 1px solid rgba(52,211,153,0.2); }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 18px;
      color: var(--text-faint);
      font-size: 0.8rem;
    }
    .secure-badge { display: inline-flex; align-items: center; gap: 5px; }
    .secure-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--green); }

    @media (max-width: 560px) {
      .shell { width: calc(100% - 24px); padding-top: 20px; }
      .topbar { align-items: flex-start; gap: 14px; }
      .back-link { text-align: right; }
      .card { padding: 20px; border-radius: 8px; }
      .plan-strip { flex-direction: column; align-items: stretch; }
      .plan-tag { align-self: flex-start; }
      label { flex-direction: column; gap: 2px; }
      .summary-row { align-items: flex-start; }
      .footer { align-items: flex-start; flex-direction: column; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a href="/" class="brand" aria-label="Back to Keptra">
        <svg viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect width="256" height="256" rx="56" fill="#0D1416"/><rect x="13" y="13" width="230" height="230" rx="46" fill="#142629" stroke="#37B69F" stroke-width="12"/><path d="M128 49L178 136H78L128 49Z" fill="#37B69F"/><path d="M211 116L161 202L112 116H211Z" fill="#52D7B5"/><path d="M55 152L104 67L154 152H55Z" fill="#2585A1"/><path d="M88 139L121 173L190 92" stroke="#F6FBFA" stroke-width="21" stroke-linecap="round" stroke-linejoin="round"/><path d="M67 67H101M67 67V101M188 67H222M222 67V101M67 188V222H101M188 222H222V188" stroke="#F6FBFA" stroke-opacity=".78" stroke-width="11" stroke-linecap="round"/></svg>
        Keptra
      </a>
      <a href="/#pricing" class="back-link">← Back to pricing</a>
    </div>

    <div class="card">
      <div class="plan-strip">
        <div>
          <div class="plan-label" id="planName">Loading…</div>
          <div class="plan-price" id="planPrice">—</div>
        </div>
        <div class="plan-tag" id="planTag">License</div>
      </div>

      <div class="summary">
        <div class="summary-row">
          <span>Base plan</span>
          <strong id="planBaseValue">—</strong>
        </div>
        <div class="summary-row">
          <span>Devices</span>
          <strong id="planDeviceValue">1 device</strong>
        </div>
        <div class="summary-row total">
          <span id="planTotalLabel">Due today</span>
          <strong id="planTotalValue">—</strong>
        </div>
        <div class="summary-row is-muted" id="planRenewalRow" style="display:none">
          <span>Renews at</span>
          <strong id="planRenewalValue">—</strong>
        </div>
      </div>

      <div class="alert alert-error" id="error" role="alert"></div>
      <div class="alert alert-success" id="success" role="status"></div>

      <form id="checkoutForm" class="form">
        <div class="form-group">
          <label for="name">
            Full name
            <span class="field-note">Shown on the license</span>
          </label>
          <input type="text" id="name" name="name" required placeholder="Oscar Smith" autocomplete="name" />
        </div>

        <div class="form-group">
          <label for="email">
            Email address
            <span class="field-note">Where we send the code</span>
          </label>
          <input type="email" id="email" name="email" required placeholder="oscar@example.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label id="deviceCountTitle">
            Devices
            <span class="field-note">Seats on this license</span>
          </label>
          <div class="device-stepper" id="deviceStepper" role="group" aria-labelledby="deviceCountTitle">
            <button type="button" id="deviceMinus" aria-label="Remove one device" disabled>−</button>
            <div class="device-stepper-value" id="deviceCountStepValue" aria-live="polite">1 device</div>
            <button type="button" id="devicePlus" aria-label="Add one device" disabled>+</button>
          </div>
          <input type="hidden" id="deviceCountInput" name="deviceCount" value="1" />
          <div class="field-hint" id="deviceHint">1 device included.</div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn" disabled>
          <span>Proceed to payment</span>
          <span aria-hidden="true">→</span>
        </button>
      </form>

      <div class="footer">
        <a href="/#pricing" style="color:var(--text-faint)">← Pricing</a>
        <div class="secure-badge">
          <span class="secure-dot"></span>
          Secured by Stripe
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const allowedPlans = new Set(['monthly', 'yearly', 'lifetime']);
    const requestedPlan = String(params.get('plan') || 'monthly').toLowerCase();
    const plan = allowedPlans.has(requestedPlan) ? requestedPlan : 'monthly';
    const requestedDevices = parsePositiveInt(params.get('devices'), 1);

    let pricingData = null;
    let selectedDevices = requestedDevices;

    function parsePositiveInt(value, fallback) {
      const n = Number.parseInt(value || '', 10);
      return Number.isInteger(n) && n > 0 ? n : fallback;
    }

    function safeCurrency(value) {
      const currency = String(value || 'AUD').toUpperCase();
      return /^[A-Z]{3}$/.test(currency) ? currency : 'AUD';
    }

    function formatMoney(value, currency, period) {
      const amount = Number(value || 0);
      const money = new Intl.NumberFormat('en-AU', {
        style: 'currency', currency: safeCurrency(currency),
        minimumFractionDigits: amount % 1 === 0 ? 0 : 2,
      }).format(amount);
      return money + (period ? ' ' + period : '');
    }

    function deviceLabel(n) { return n === 1 ? '1 device' : n + ' devices'; }

    function displayPlanMeta() {
      const names = { monthly: 'Monthly Pro', yearly: 'Yearly Pro', lifetime: 'Lifetime License' };
      const tags  = { monthly: 'Flexible', yearly: 'Best value', lifetime: 'One-time' };
      document.getElementById('planName').textContent = names[plan] || plan;
      document.getElementById('planTag').textContent  = tags[plan]  || 'License';
    }

    function syncDeviceStepper() {
      if (!pricingData) return;
      const included = Math.max(1, Number(pricingData.includedDevices || 1));
      const max = Math.max(included, Number(pricingData.maxCheckoutDevices || included));
      if (selectedDevices < included) selectedDevices = included;
      if (selectedDevices > max)      selectedDevices = max;

      document.getElementById('deviceCountStepValue').textContent = deviceLabel(selectedDevices);
      document.getElementById('deviceCountInput').value = String(selectedDevices);
      document.getElementById('deviceMinus').disabled = selectedDevices <= included;
      document.getElementById('devicePlus').disabled = selectedDevices >= max;
    }

    function buildDeviceOptions() {
      syncDeviceStepper();
    }

    function updateDisplay() {
      if (!pricingData?.plans) return;
      const planData = pricingData.plans[plan];
      if (!planData) { showError('Plan not found.'); return; }

      const currency = safeCurrency(pricingData.currency);
      const included = Math.max(1, Number(pricingData.includedDevices || 1));
      const extraPrice = Number(pricingData.deviceUpgradePrice || 0) / 100;
      const extraSeats = Math.max(0, selectedDevices - included);
      const total = planData.price + extraSeats * extraPrice;
      const renewalRow = document.getElementById('planRenewalRow');
      const renewalValue = document.getElementById('planRenewalValue');

      displayPlanMeta();
      syncDeviceStepper();
      document.getElementById('planPrice').textContent       = formatMoney(planData.price, currency, planData.period || '');
      document.getElementById('planBaseValue').textContent   = formatMoney(planData.price, currency, planData.period || '');
      document.getElementById('planDeviceValue').textContent = deviceLabel(selectedDevices);
      document.getElementById('planTotalValue').textContent  = formatMoney(total, currency, '');
      document.getElementById('planTotalLabel').textContent  = plan === 'lifetime' ? 'Total' : 'Due today';
      if (plan === 'lifetime') {
        renewalRow.style.display = 'none';
      } else {
        renewalRow.style.display = 'flex';
        renewalValue.textContent = formatMoney(planData.price, currency, planData.period || '');
      }

      const hint = document.getElementById('deviceHint');
      if (extraPrice > 0) {
        const renewalText = plan === 'lifetime' ? '' : ` Renewal stays ${formatMoney(planData.price, currency, planData.period || '')}.`;
        hint.textContent = `${deviceLabel(included)} included. Each extra device adds ${formatMoney(extraPrice, currency, '')} once.${renewalText}`;
      } else {
        hint.textContent = 'Choose how many devices this license covers.';
      }
      document.getElementById('submitBtn').disabled = false;
    }

    async function loadPricing() {
      try {
        const res = await fetch(BASE + '/api/v1/pricing');
        if (!res.ok) throw new Error('Failed to load pricing');
        pricingData = await res.json();
        buildDeviceOptions();
        updateDisplay();
        if (requestedPlan !== plan) {
          showError('That plan link was not recognised, so monthly pricing is shown.');
        } else {
          document.getElementById('error').classList.remove('show');
        }
      } catch (err) {
        pricingData = {
          currency: 'AUD',
          plans: {
            monthly: { price: 9, period: '/mo' },
            yearly: { price: 49, period: '/yr' },
            lifetime: { price: 49, period: '' },
          },
          deviceUpgradePrice: 500,
          includedDevices: 1,
          maxCheckoutDevices: 5,
        };
        buildDeviceOptions();
        updateDisplay();
        const planMessage = requestedPlan !== plan ? ' That plan link was not recognised, so monthly pricing is shown.' : '';
        showError('Using offline pricing preview because live pricing could not be reached. Stripe will confirm the final total before payment.' + planMessage);
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('success').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('success');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('error').classList.remove('show');
    }

    document.getElementById('deviceMinus').addEventListener('click', () => {
      selectedDevices -= 1;
      updateDisplay();
    });

    document.getElementById('devicePlus').addEventListener('click', () => {
      selectedDevices += 1;
      updateDisplay();
    });

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('submitBtn');

      if (!name || !email) { showError('Please fill in all fields.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email address.'); return; }
      if (!pricingData?.plans?.[plan]) { showError('Pricing is still loading. Please try again in a moment.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span>Preparing checkout…</span>';

      try {
        const res = await fetch(BASE + '/api/v1/checkout/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ plan, name, email, maxDevices: selectedDevices }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Checkout failed');
        if (data.url) {
          const summary = data.summary;
          const total = summary && Number.isFinite(Number(summary.totalCents))
            ? new Intl.NumberFormat('en-AU', { style: 'currency', currency: safeCurrency(summary.currency) }).format(Number(summary.totalCents) / 100)
            : document.getElementById('planTotalValue').textContent;
          const renewal = plan === 'lifetime' ? '' : ' Renewals exclude one-time extra device seats.';
          showSuccess('Redirecting to Stripe. Total before payment: ' + total + ' for ' + deviceLabel(selectedDevices) + '.' + renewal);
          setTimeout(() => { window.location.href = data.url; }, 400);
        } else {
          throw new Error('No checkout URL returned');
        }
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.innerHTML = '<span>Proceed to payment</span><span aria-hidden="true">→</span>';
      }
    });

    loadPricing();
  </script>
</body>
</html>

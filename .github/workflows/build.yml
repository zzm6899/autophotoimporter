name: Build And Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos
          - os: windows-latest
            label: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-build
          path: out/make/**/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
      VERSION: ${{ github.ref_name }}
      UPDATE_ADMIN_ENDPOINT: ${{ secrets.UPDATE_ADMIN_ENDPOINT }}
      UPDATE_ADMIN_API_TOKEN: ${{ secrets.UPDATE_ADMIN_API_TOKEN }}
      TRUENAS_HOST: ${{ secrets.TRUENAS_HOST }}
      TRUENAS_USER: ${{ secrets.TRUENAS_USER }}
      TRUENAS_PATH: ${{ secrets.TRUENAS_PATH }}
      PUBLIC_ARTIFACTS_BASE_URL: ${{ secrets.PUBLIC_ARTIFACTS_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.nupkg' -o -name 'RELEASES' \) -print | while read -r file; do
            cp "$file" release-assets/
          done
          ls -la release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" release-assets/* \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes "Automated release for $TAG_NAME"

      - name: Set up SSH key for TrueNAS publish
        if: ${{ env.TRUENAS_HOST != '' && env.TRUENAS_USER != '' && env.TRUENAS_PATH != '' && env.PUBLIC_ARTIFACTS_BASE_URL != '' && env.UPDATE_ADMIN_ENDPOINT != '' && env.UPDATE_ADMIN_API_TOKEN != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TRUENAS_SSH_KEY }}

      - name: Mirror public artifacts to TrueNAS and import hosted releases
        if: ${{ env.TRUENAS_HOST != '' && env.TRUENAS_USER != '' && env.TRUENAS_PATH != '' && env.PUBLIC_ARTIFACTS_BASE_URL != '' && env.UPDATE_ADMIN_ENDPOINT != '' && env.UPDATE_ADMIN_API_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          ssh -o StrictHostKeyChecking=accept-new "$TRUENAS_USER@$TRUENAS_HOST" "mkdir -p '$TRUENAS_PATH/artifacts/windows' '$TRUENAS_PATH/artifacts/macos'"

          WINDOWS_EXE="$(find release-assets -maxdepth 1 -type f -name '*.exe' | head -n 1 || true)"
          WINDOWS_NUPKG="$(find release-assets -maxdepth 1 -type f -name '*.nupkg' | head -n 1 || true)"
          WINDOWS_RELEASES="$(find release-assets -maxdepth 1 -type f -name 'RELEASES' | head -n 1 || true)"
          WINDOWS_ZIP="$(find release-assets -maxdepth 1 -type f -name '*win*.zip' | head -n 1 || true)"
          MAC_DMG="$(find release-assets -maxdepth 1 -type f -name '*.dmg' | head -n 1 || true)"
          MAC_ZIP="$(find release-assets -maxdepth 1 -type f \( -name '*darwin*.zip' -o -name '*mac*.zip' \) | head -n 1 || true)"

          if [[ -n "$WINDOWS_EXE" ]]; then
            scp "$WINDOWS_EXE" "$TRUENAS_USER@$TRUENAS_HOST:$TRUENAS_PATH/artifacts/windows/PhotoImporter-Setup-$VERSION.exe"
          fi
          if [[ -n "$WINDOWS_NUPKG" ]]; then
            scp "$WINDOWS_NUPKG" "$TRUENAS_USER@$TRUENAS_HOST:$TRUENAS_PATH/artifacts/windows/"
          fi
          if [[ -n "$WINDOWS_RELEASES" ]]; then
            scp "$WINDOWS_RELEASES" "$TRUENAS_USER@$TRUENAS_HOST:$TRUENAS_PATH/artifacts/windows/RELEASES"
          fi
          if [[ -n "$WINDOWS_ZIP" ]]; then
            scp "$WINDOWS_ZIP" "$TRUENAS_USER@$TRUENAS_HOST:$TRUENAS_PATH/artifacts/windows/"
          fi
          if [[ -n "$MAC_DMG" ]]; then
            MAC_DMG_NAME="$(basename "$MAC_DMG")"
            scp "$MAC_DMG" "$TRUENAS_USER@$TRUENAS_HOST:$TRUENAS_PATH/artifacts/macos/$MAC_DMG_NAME"
            node scripts/publish-update-release.mjs \
              --endpoint "$UPDATE_ADMIN_ENDPOINT" \
              --token "$UPDATE_ADMIN_API_TOKEN" \
              --version "$VERSION" \
              --platform macos \
              --release-name "Photo Importer $VERSION" \
              --artifact-url "${PUBLIC_ARTIFACTS_BASE_URL%/}/macos/$MAC_DMG_NAME" \
              --release-url "${UPDATE_ADMIN_ENDPOINT%/}/releases/$VERSION" \
              --notes "Automated release for $TAG_NAME" \
              --channel stable \
              --rollout live
          fi
          if [[ -n "$MAC_ZIP" ]]; then
            scp "$MAC_ZIP" "$TRUENAS_USER@$TRUENAS_HOST:$TRUENAS_PATH/artifacts/macos/"
          fi
          if [[ -n "$WINDOWS_EXE" ]]; then
            node scripts/publish-update-release.mjs \
              --endpoint "$UPDATE_ADMIN_ENDPOINT" \
              --token "$UPDATE_ADMIN_API_TOKEN" \
              --version "$VERSION" \
              --platform windows \
              --release-name "Photo Importer $VERSION" \
              --artifact-url "${PUBLIC_ARTIFACTS_BASE_URL%/}/windows/PhotoImporter-Setup-$VERSION.exe" \
              --release-url "${UPDATE_ADMIN_ENDPOINT%/}/releases/$VERSION" \
              --notes "Automated release for $TAG_NAME" \
              --channel stable \
              --rollout live
          fi

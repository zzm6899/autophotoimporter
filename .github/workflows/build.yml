name: Build And Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            arch: x64
          - os: macos-15-intel
            label: macos-x64
            arch: x64
          - os: macos-15
            label: macos-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - run: npm run typecheck

      - run: npm test

      - run: npm run audit:runtime

      - name: Download runtime models
        run: npm run models

      - name: Check macOS signing configuration
        if: startsWith(matrix.os, 'macos') && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          REQUIRE_MAC_SIGNING: ${{ vars.REQUIRE_MAC_SIGNING || secrets.REQUIRE_MAC_SIGNING }}
        run: |
          set -euo pipefail
          required=(APPLE_SIGNING_IDENTITY APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD)
          missing=()
          present=0
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            else
              present=$((present + 1))
            fi
          done
          if [[ "$present" -eq 0 ]]; then
            if [[ "${REQUIRE_MAC_SIGNING,,}" == "true" || "$REQUIRE_MAC_SIGNING" == "1" ]]; then
              echo "::error::macOS signing is required, but no Apple signing secrets are configured."
              exit 1
            fi
            echo "::warning::Building unsigned macOS DMG/ZIP artifacts. Gatekeeper will warn users until builds are signed and notarized."
            exit 0
          fi
          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "::error::Partial macOS signing config. Missing: ${missing[*]}"
            echo "::error::Either configure all Apple signing secrets or remove all of them to build unsigned artifacts."
            exit 1
          fi
          echo "macOS signing and notarization secrets are configured."

      - name: Install Apple signing certificate
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_CERTIFICATE_BASE64" ]]; then
            echo "No Apple signing certificate configured; building unsigned macOS artifacts."
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/apple-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${APPLE_KEYCHAIN_PASSWORD:-temporary-ci-keychain-password}"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH" || echo "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Make package
        run: npm run make -- --arch=${{ matrix.arch }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_APP_BUNDLE_ID: ${{ vars.MAC_APP_BUNDLE_ID || secrets.MAC_APP_BUNDLE_ID }}

      - run: npm run package:smoke
        env:
          PACKAGE_SMOKE_LAUNCH: "0"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-build
          path: out/make/**/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
      VERSION: ${{ github.ref_name }}
      UPDATE_ADMIN_ENDPOINT: ${{ secrets.UPDATE_ADMIN_ENDPOINT }}
      UPDATE_ADMIN_API_TOKEN: ${{ secrets.UPDATE_ADMIN_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.nupkg' -o -name 'RELEASES' \) -print | while read -r file; do
            rel="${file#artifacts/}"
            artifact_label="${rel%%/*}"
            base="$(basename "$file")"
            target="release-assets/$base"
            if [[ "$artifact_label" == macos-* ]]; then
              target="release-assets/${artifact_label}-${base}"
            fi
            if [[ -e "$target" ]]; then
              safe="${file#artifacts/}"
              safe="${safe//\//-}"
              target="release-assets/$safe"
            fi
            cp "$file" "$target"
          done
          ls -la release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" release-assets/* \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes "Automated release for $TAG_NAME"

      - name: Upload hosted artifacts to update admin
        if: ${{ env.UPDATE_ADMIN_ENDPOINT != '' && env.UPDATE_ADMIN_API_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"

          WINDOWS_EXE="$(find release-assets -maxdepth 1 -type f -name '*.exe' | head -n 1 || true)"
          WINDOWS_NUPKG="$(find release-assets -maxdepth 1 -type f -name '*.nupkg' | head -n 1 || true)"
          WINDOWS_RELEASES="$(find release-assets -maxdepth 1 -type f -name 'RELEASES' | head -n 1 || true)"
          WINDOWS_ZIP="$(find release-assets -maxdepth 1 -type f -name '*win*.zip' | head -n 1 || true)"
          MAC_DMG_ARM64="$(find release-assets -maxdepth 1 -type f \( -name '*arm64*.dmg' -o -name '*macos-arm64*.dmg' \) | head -n 1 || true)"
          MAC_DMG_X64="$(find release-assets -maxdepth 1 -type f \( -name '*x64*.dmg' -o -name '*macos-x64*.dmg' \) | head -n 1 || true)"
          MAC_DMG="${MAC_DMG_ARM64:-$MAC_DMG_X64}"
          MAC_ZIP="$(find release-assets -maxdepth 1 -type f \( -name '*darwin*.zip' -o -name '*mac*.zip' \) | head -n 1 || true)"

          if [[ -n "$WINDOWS_NUPKG" ]]; then
            node scripts/publish-update-release.mjs \
              --endpoint "$UPDATE_ADMIN_ENDPOINT" \
              --token "$UPDATE_ADMIN_API_TOKEN" \
              --platform windows \
              --file "$WINDOWS_NUPKG" \
              --upload-only
          fi
          if [[ -n "$WINDOWS_RELEASES" ]]; then
            node scripts/publish-update-release.mjs \
              --endpoint "$UPDATE_ADMIN_ENDPOINT" \
              --token "$UPDATE_ADMIN_API_TOKEN" \
              --platform windows \
              --file "$WINDOWS_RELEASES" \
              --upload-only
          fi
          if [[ -n "$WINDOWS_ZIP" ]]; then
            node scripts/publish-update-release.mjs \
              --endpoint "$UPDATE_ADMIN_ENDPOINT" \
              --token "$UPDATE_ADMIN_API_TOKEN" \
              --platform windows \
              --file "$WINDOWS_ZIP" \
              --upload-only
          fi
          if [[ -n "$MAC_ZIP" ]]; then
            node scripts/publish-update-release.mjs \
              --endpoint "$UPDATE_ADMIN_ENDPOINT" \
              --token "$UPDATE_ADMIN_API_TOKEN" \
              --platform macos \
              --file "$MAC_ZIP" \
              --upload-only
          fi
          if [[ -n "$MAC_DMG" ]]; then
            node scripts/publish-update-release.mjs \
              --endpoint "$UPDATE_ADMIN_ENDPOINT" \
              --token "$UPDATE_ADMIN_API_TOKEN" \
              --version "$VERSION" \
              --platform macos \
              --release-name "Keptra $VERSION" \
              --file "$MAC_DMG" \
              --release-url "https://keptra.z2hs.au/releases/$VERSION" \
              --notes "Automated release for $TAG_NAME" \
              --channel stable \
              --rollout live
          fi
          if [[ -n "$WINDOWS_EXE" ]]; then
            node scripts/publish-update-release.mjs \
              --endpoint "$UPDATE_ADMIN_ENDPOINT" \
              --token "$UPDATE_ADMIN_API_TOKEN" \
              --version "$VERSION" \
              --platform windows \
              --release-name "Keptra $VERSION" \
              --file "$WINDOWS_EXE" \
              --release-url "https://keptra.z2hs.au/releases/$VERSION" \
              --notes "Automated release for $TAG_NAME" \
              --channel stable \
              --rollout live
          fi

      - name: Smoke live update endpoints
        if: ${{ env.UPDATE_ADMIN_ENDPOINT != '' && env.UPDATE_ADMIN_API_TOKEN != '' }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXPECT_LATEST_VERSION="$VERSION" npm run release:smoke
